name: seal

on: [push, pull_request]

# Two gates. (1) The Codex seal is the repo's identity: every push must carry
# the byte-identical 217-byte Codex. (2) Form checks: scripts compile, the
# tests pass, and no SKILL.md reference link is dangling. Form, never life.

permissions:
  contents: read

jobs:
  verify-seal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify the Codex seal is byte-identical
        run: python3 bin/lint.py --seal

  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile every script (syntax gate)
        run: python -m py_compile scripts/*.py bin/*.py
      - name: Reference link-checker
        run: python tests/check_links.py
      - name: Tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest -q
